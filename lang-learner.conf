# Print each sub in stdout.
# Use for easy access or may be integration
trace_subs=yes

# Only work for lang-learner.js
trace_log=yes

# Language you learn
learn=jpn jp rus

# List of languages you know
know=vi jpn+rus jpn+eng rus eng

# Preferred language for ChatGPT explanations
# Only work for lang-learner.js
preferred_lang=Vietnamese

# Urls for F1, F2, F3
# %s will be replaced with a subtitle
# %p will be replaced with preferred_lang
browser=x-www-browser
url1=https://jisho.org/search/%s
url2=https://translate.google.com/?sl=auto&text=%s
url3=https://chatgpt.com/?temporary-chat=true&prompt=Provide%20a%20short,%20direct%20explanation%20of%20the%20following%20phrase%20in%20%p%20-%20no%20extra%20details.:%20%0A%0A%s

# Dir to store info about subtitle
# during 'key_store' command
store_dir=to_learn

# External script
# Arguments:
#  1 - subtitle
#  2 - file of the movie
#  3 - start time
#  4 - end time
script=echo

# Default Kebindings
key_toggle_lang=b
key_seek_cur_sub=c
key_ab_loop_sub=g
key_open_url1=F1
key_open_url2=F2
key_open_url3=F3
key_auto_ab_loop=F5
key_store=F6
key_script=F7
